<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Cores</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Coredrão - Seu conversor de cores interativo</h1>
    </header>
    <main>
        <div class="container">
            <aside class="left-panel">
                <h2>Selecionar Sistema de Cores</h2>
                <select id="color-system">
                    <option value="rgb">RGB</option>
                    <option value="cmyk">CMYK</option>
                    <option value="hsl">HSL</option>
                    <option value="hsv">HSV</option>
                </select>
                <div id="inputs">
                </div>
            </aside>
            <div class="color-palette palette-panel">
                <h3>Cores do Arco-Íris</h3>
                <div class="rainbow-colors">
                    <div class="color-swatch" data-color="#FF0000" style="background-color: #FF0000;"></div>
                    <div class="color-swatch" data-color="#FFA500" style="background-color: #FFA500;"></div>
                    <div class="color-swatch" data-color="#FFFF00" style="background-color: #FFFF00;"></div>
                    <div class="color-swatch" data-color="#008000" style="background-color: #008000;"></div>
                    <div class="color-swatch" data-color="#0000FF" style="background-color: #0000FF;"></div>
                    <div class="color-swatch" data-color="#4B0082" style="background-color: #4B0082;"></div>
                    <div class="color-swatch" data-color="#800080" style="background-color: #800080;"></div>
                </div>
            </div>
            <section class="center-panel">
                <h2>Tela de Pintura</h2>
                <canvas id="paint-canvas" width="600" height="400"></canvas>
                <div class="button-group">
                    <button type="button" id="undo" title="Desfazer">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 5a5 5 0 0 0-7 7"/>
                            <path d="M5 7l-3 3 3 3"/>
                        </svg>
                    </button>
                    <button type="button" id="redo" title="Refazer">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 5a5 5 0 0 1 7 7"/>
                            <path d="M11 7l3 3-3 3"/>
                        </svg>
                    </button>
                    <button type="button" id="eraser" title="Borracha">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12L6 15 13 8 10 5 3 12Z"/>
                            <path d="M9 7l-3 3"/>
                        </svg>
                    </button>
                    <button type="button" id="brush" title="Pincel">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4.5 11.5L8.5 7.5 10.5 9.5 6.5 13.5 4.5 13.5Z"/>
                            <path d="M10.5 9.5l2-2 1 1-2 2"/>
                        </svg>
                    </button>
                    <button type="button" id="clear-canvas" title="Limpar tudo">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 6h6"/>
                            <path d="M6 6V4h4v2"/>
                            <path d="M5 6v8h6V6"/>
                            <path d="M7.5 8.5v3"/>
                            <path d="M9.5 8.5v3"/>
                        </svg>
                    </button>
                </div>
            </section>
            <aside class="right-panel">
                <h2>Preview da Cor</h2>
                <div id="color-preview"></div>
                <input type="text" id="color-code" value="#FF0000">
                <h3>Outros Sistemas</h3>
                <table id="color-table">
                    <thead>
                        <tr>
                            <th>Sistema</th>
                            <th>Componente</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </aside>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
